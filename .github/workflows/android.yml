name: Android CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Build unsigned release bundle
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew bundleRelease

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: build/reports/tests/coverage/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: calendar-add-debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload unsigned release bundle
        uses: actions/upload-artifact@v4
        if: success() && startsWith(github.ref, 'refs/tags/')
        with:
          name: calendar-add-unsigned-release-aab-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Move rolling main-build tag
        if: success() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa latest-main -m "Latest main build"
          git push --force origin refs/tags/latest-main

      - name: Publish rolling main prerelease
        uses: softprops/action-gh-release@v2
        if: success() && github.ref == 'refs/heads/main'
        with:
          tag_name: latest-main
          name: Calendar Add latest main build
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Rolling prerelease for the latest successful `main` build.

            Included assets:
            - Debug APK for direct device testing

            Notes:
            - This release is updated automatically on each successful push to `main`.
            - For tagged alpha builds, see the separate alpha prereleases.
          files: |
            app/build/outputs/apk/debug/app-debug.apk

      - name: Draft alpha prerelease
        uses: softprops/action-gh-release@v2
        if: success() && startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-alpha')
        with:
          tag_name: ${{ github.ref_name }}
          name: Calendar Add ${{ github.ref_name }}
          draft: true
          prerelease: true
          generate_release_notes: false
          body: |
            Alpha prerelease build for testers.

            Included assets:
            - Debug APK for direct device testing
            - Unsigned release AAB built on GitHub Actions

            Notes:
            - The AAB is unsigned from CI on purpose.
            - Final production signing remains local.
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/bundle/release/app-release.aab

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run lint
        run: ./gradlew lint

  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run SAST
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: >
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        with:
          sarif_file: 'trivy-results.sarif'
